<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InRoad | Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@600;700&display=swap" rel="stylesheet"/>
  <style>body{background:#0b1326;color:#dae2fd}.glass-card{background:rgba(30,41,59,.5);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1)}</style>
</head>
<body class="min-h-screen font-sans antialiased">
  <header class="border-b border-white/10 px-6 h-16 flex items-center justify-between max-w-lg mx-auto w-full">
    <a href="/index.html" class="text-xl font-bold text-[#8ed5ff]">InRoad</a>
    <div data-auth-nav class="flex items-center gap-3"></div>
  </header>

  <main class="max-w-md mx-auto px-6 py-12">
    <h1 class="text-3xl font-bold mb-2">Sign in</h1>
    <p class="text-[#bdc8d1] mb-8 text-sm">Access your career intelligence dashboard.</p>

    <div class="glass-card rounded-xl p-8 space-y-5 mb-6">
      <button
        type="button"
        id="google-signin-btn"
        class="w-full py-3 flex items-center justify-center gap-3 bg-white text-gray-800 font-semibold rounded-lg hover:bg-gray-100 transition-colors"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-xs text-[#bdc8d1] uppercase tracking-wider">or email</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>
    </div>

    <form id="login-form" class="glass-card rounded-xl p-8 space-y-5">
      <div>
        <label class="block text-xs uppercase tracking-wider text-[#bdc8d1] mb-2" for="email">Email</label>
        <input id="email" type="email" required class="w-full bg-[#222a3d]/50 border border-white/20 rounded-lg p-3 text-sm"/>
      </div>
      <div>
        <label class="block text-xs uppercase tracking-wider text-[#bdc8d1] mb-2" for="password">Password</label>
        <input id="password" type="password" required minlength="6" class="w-full bg-[#222a3d]/50 border border-white/20 rounded-lg p-3 text-sm"/>
      </div>
      <p id="login-status" class="text-sm text-[#bdc8d1]" role="status"></p>
      <button type="submit" class="w-full py-3 bg-[#38bdf8] text-[#004965] font-bold rounded-lg">Sign in</button>
    </form>

    <p class="text-center text-sm text-[#bdc8d1] mt-6">
      No account? <a href="/register.html" class="text-[#8ed5ff] hover:underline">Register</a>
    </p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/pages/auth-shared.js"></script>
  <script src="/js/pages/login.js"></script>
</body>
</html>
