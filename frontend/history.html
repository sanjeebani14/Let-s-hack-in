<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View saved InRoad analysis runs on this device." />
    <title>History | InRoad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="font-body-md text-body-md" data-page="history">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div id="site-header"></div>

    <main id="main-content" class="bg-background pt-24">
      <section class="hero-gradient border-b border-outline-variant px-margin-mobile py-xl md:px-margin-desktop">
        <div class="mx-auto max-w-[900px]">
          <p class="mb-sm font-data-sm text-data-sm uppercase tracking-widest text-primary-container">Saved on this device</p>
          <h1 class="mb-sm font-display-lg text-display-lg text-on-surface">Analysis history</h1>
          <p class="font-body-lg text-body-lg text-on-surface-variant">
            Past runs are stored in your browser only — not on a server. Open any run to view results again.
          </p>
        </div>
      </section>

      <section class="px-margin-mobile py-xl md:px-margin-desktop">
        <div class="mx-auto max-w-[900px]">
          <div class="mb-md flex flex-col gap-sm sm:flex-row sm:items-center sm:justify-between">
            <p id="history-count" class="font-data-sm text-data-sm text-on-surface-variant"></p>
            <button
              id="history-clear-all"
              type="button"
              class="hidden rounded-full border border-outline-variant px-md py-xs font-data-sm text-data-sm text-on-surface-variant hover:border-error hover:text-error"
            >
              Clear all
            </button>
          </div>
          <div id="history-list" class="space-y-md"></div>
          <div id="history-empty" class="hidden glass-card rounded-xl p-xl text-center">
            <span class="material-symbols-outlined mb-sm text-5xl text-primary-container" aria-hidden="true">history</span>
            <h2 class="mb-sm font-headline-md text-headline-md text-on-surface">No saved runs yet</h2>
            <p class="mb-md font-body-md text-body-md text-on-surface-variant">
              Run Analyze once — results are saved here automatically (up to 20 runs).
            </p>
            <a
              href="analyze.html"
              class="inline-block rounded-full bg-primary-container px-xl py-md font-bold text-on-primary-container"
            >
              Run analysis
            </a>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script type="module" src="/src/entries/history.js"></script>
  </body>
</html>
